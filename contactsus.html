<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Contact Form</title>
</head>
<body>

<h2>Contact Form</h2>

<form>
    <label>Full name:</label><br>
    <input type="text" name="fullname" placeholder="Enter your full name"><br><br>

    <label>Email address:</label><br>
    <input type="email" name="email" placeholder="Enter your email address"><br><br>

    <label>Phone number:</label><br>
    <input type="tel" name="phone" placeholder="Enter your phone number"><br><br>

    <label>Subject line:</label><br>
    <input type="text" name="subject" placeholder="Enter subject"><br><br>

    <label>Message:</label><br>
    <textarea name="message"  placeholder="Type your message here"></textarea><br><br>

    <label>Send message:</label><br>
    <input type="submit" value="Send Message">
</form>

</body>
</html>
